name: lumanar

services:
  - name: web
    dockerfile_path: Dockerfile
    github:
      repo: gabimolocea/aprinde-lumina
      branch: main
      deploy_on_push: true
    http_port: 8000
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    health_check:
      http_path: /api/candles/meta/
      initial_delay_seconds: 30
      timeout_seconds: 10
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        value: ""           # setează în UI sau lasă Railway să injecteze
        type: SECRET
      - key: ALLOWED_HOSTS
        value: ""           # ex: lumanar.ro,www.lumanar.ro
      - key: DATABASE_URL
        value: ${lumanar-db.DATABASE_URL}
      - key: REDIS_URL
        value: ${lumanar-redis.REDIS_URL}
      - key: SECURE_SSL_REDIRECT
        value: "true"
      - key: STRIPE_SECRET_KEY
        value: ""
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        value: ""
        type: SECRET
      - key: TWILIO_ACCOUNT_SID
        value: ""
        type: SECRET
      - key: TWILIO_AUTH_TOKEN
        value: ""
        type: SECRET
      - key: TWILIO_FROM_NUMBER
        value: ""

databases:
  - name: lumanar-db
    engine: PG
    version: "16"
    production: false

  - name: lumanar-redis
    engine: REDIS
    version: "7"
    production: false
